<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novel2Script - AI 小说转剧本</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
        background: #f5f6f8;
        color: #222;
        min-height: 100vh;
        line-height: 1.6;
      }

      /* header */
      .header {
        background: #fff;
        padding: 16px 28px;
        border-bottom: 1px solid #e8e8ec;
        display: flex;
        align-items: baseline;
        gap: 16px;
      }
      .header h1 {
        font-size: 20px;
        font-weight: 700;
        color: #111;
      }
      .header p {
        font-size: 12px;
        color: #999;
      }

      /* layout */
      .wrapper {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 12px;
        height: calc(100vh - 62px);
      }
      .wrapper > .row {
        flex: 1 1 0;
        display: flex;
        gap: 12px;
        min-height: 0;
      }
      .wrapper > .row > * {
        flex: 1 1 0;
        min-width: 0;
      }

      /* panels */
      .panel {
        display: flex;
        flex-direction: column;
        background: #fff;
        border: 1px solid #e8e8ec;
      }
      .phead {
        flex-shrink: 0;
        padding: 10px 16px;
        background: #f9fafb;
        border-bottom: 1px solid #e8e8ec;
        font-size: 13px;
        font-weight: 600;
        color: #444;
      }
      .pbody {
        flex: 1 1 0;
        overflow-y: auto;
        padding: 14px;
        min-height: 0;
      }

      /* forms */
      .fg {
        margin-bottom: 10px;
      }
      .fg label {
        display: block;
        font-size: 11px;
        color: #888;
        margin-bottom: 3px;
        font-weight: 500;
      }
      .fg input,
      .fg select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #dcdee2;
        font-size: 12px;
        background: #fafbfc;
        color: #222;
        outline: none;
      }
      .fg input:focus,
      .fg select:focus {
        border-color: #444;
        background: #fff;
      }

      /* buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 7px 16px;
        border: 1px solid #dcdee2;
        font-size: 12px;
        cursor: pointer;
        font-weight: 500;
        background: #fff;
        color: #444;
        transition: 0.15s;
      }
      .btn:hover {
        border-color: #222;
        color: #111;
      }
      .btn-primary {
        background: #111;
        color: #fff;
        border-color: #111;
      }
      .btn-primary:hover {
        background: #333;
      }
      .btn-sm {
        padding: 4px 10px;
        font-size: 11px;
      }

      /* status */
      .status {
        padding: 8px 12px;
        font-size: 12px;
        margin-bottom: 8px;
      }
      .status-ok {
        background: #f0f8f0;
        color: #2e7d32;
        border-left: 2px solid #2e7d32;
      }
      .status-err {
        background: #fef5f5;
        color: #c62828;
        border-left: 2px solid #c62828;
      }
      .stats {
        display: flex;
        gap: 16px;
        font-size: 12px;
        color: #666;
        margin-bottom: 8px;
        padding: 8px 12px;
        background: #f9fafb;
      }
      .stats span {
        color: #111;
        font-weight: 600;
      }

      /* progress */
      .progress-wrap {
        margin: 0 0 12px;
        display: none;
      }
      .progress-wrap.show {
        display: block;
      }
      .progress-bar {
        height: 3px;
        background: #e8e8ec;
        overflow: hidden;
      }
      .progress-bar .fill {
        height: 100%;
        width: 0;
        background: #111;
        animation: prog 2.5s ease infinite;
      }
      @keyframes prog {
        0% {
          width: 0;
        }
        30% {
          width: 35%;
        }
        60% {
          width: 70%;
        }
        100% {
          width: 92%;
        }
      }
      .progress-text {
        font-size: 11px;
        color: #888;
        margin-top: 4px;
      }

      /* scrollbar */
      .error-view {
        border: 1px solid #f5c6cb;
        margin-bottom: 8px;
        display: none;
      }
      .error-view.show {
        display: block;
      }
      .error-header {
        background: #fff5f5;
        color: #c62828;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 600;
        border-bottom: 1px solid #f5c6cb;
      }
      .error-body {
        max-height: 200px;
        overflow-y: auto;
        background: #fff;
        font:
          11px "SF Mono",
          "Consolas",
          monospace;
      }
      .error-line {
        padding: 0 8px;
        line-height: 1.6;
        white-space: pre;
        color: #aaa;
      }
      .error-line.hl {
        background: #fff5f5;
      }
      .error-line .ln {
        display: inline-block;
        width: 36px;
        text-align: right;
        color: #ddd;
      }
      .error-line.hl .ln {
        color: #c62828;
        font-weight: 600;
      }
      .error-msg {
        padding: 0 8px 0 46px;
        font-size: 10px;
        color: #c62828;
        background: #fff5f5;
      }

      /* YAML area */
      .yaml-area {
        display: flex;
        flex-direction: column;
      }
      .yaml-nav {
        flex-shrink: 0;
        display: flex;
        gap: 4px;
        padding: 0 0 8px;
        justify-content: flex-end;
        position: sticky;
        top: 0;
        background: #fff;
        z-index: 10;
      }
      #yaml-editor {
        width: 100%;
        flex: 1 1 auto;
        background: #fafbfc;
        color: #222;
        border: 1px solid #dcdee2;
        padding: 12px;
        font:
          12px "SF Mono",
          "Consolas",
          monospace;
        resize: none;
        line-height: 1.55;
        tab-size: 2;
        overflow-y: auto;
        min-height: 0;
        outline: none;
      }
      #yaml-editor:focus {
        border-color: #444;
        background: #fff;
      }

      /* meta + chars in timeline */
      .tl-section { padding:6px 0; }
      .tl-section h4 { font-size:10px; color:#999; font-weight:600; padding:4px 8px; margin:0; border-bottom:1px solid #f0f0f0; text-transform:uppercase; letter-spacing:.5px; }
      .tl-meta-row { display:flex; gap:8px; padding:3px 8px; font-size:11px; }
      .tl-meta-row:hover { background:#f9fafb; }
      .tl-meta-row .tl-key { color:#999; flex-shrink:0; min-width:60px; }
      .tl-meta-row .tl-val { color:#444; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .tl-meta-row .tl-edit { display:none; font-size:10px; color:#999; cursor:pointer; }
      .tl-meta-row:hover .tl-edit { display:block; }
      .tl-chars-list { display:block; padding:0; }
      .tl-char-card { display:flex; align-items:flex-start; gap:8px; padding:6px 8px; border-left:3px solid #5b9bd5; cursor:pointer; transition:.1s; }
      .tl-char-card:hover { background:#f9fafb; }
      .tl-char-card .tl-icon { width:16px; height:16px; border-radius:50%; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; font-size:9px; color:#fff; background:#5b9bd5; }
      .tl-char-card .tl-body { flex:1; min-width:0; }
      .tl-char-card .tl-body .tl-char-id { font-size:10px; font-weight:700; color:#5b9bd5; }
      .tl-char-card .tl-body .tl-char-name { font-size:12px; font-weight:600; color:#333; }
      .tl-char-card .tl-body .tl-char-role { font-size:9px; color:#fff; background:#999; padding:1px 5px; border-radius:2px; margin-left:4px; vertical-align:middle; }
      .tl-char-card .tl-body .tl-char-detail { font-size:10px; color:#888; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block; margin-top:1px; }
      .tl-char-card .tl-edit { display:none; flex-shrink:0; font-size:10px; color:#999; cursor:pointer; padding:1px 4px; }
      .tl-char-card:hover .tl-edit { display:block; }
      .tl-char-card .tl-edit:hover { color:#111; }
      #timeline {
        overflow-y: auto;
      }
      .tl-scene {
        padding: 4px 0;
      }
      .tl-scene h4 {
        font-size: 10px;
        color: #999;
        font-weight: 500;
        text-transform: uppercase;
        padding: 4px 8px;
        margin: 0;
        border-bottom: 1px solid #f0f0f0;
        letter-spacing: 0.5px;
      }
      .tl-beat {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 6px 8px;
        border-left: 3px solid transparent;
        cursor: pointer;
        transition: 0.1s;
      }
      .tl-beat:hover {
        background: #f9fafb;
      }
      .tl-beat.action {
        border-left-color: #5b9bd5;
      }
      .tl-beat.dialogue {
        border-left-color: #e8a838;
      }
      .tl-beat.transition {
        border-left-color: #999;
      }
      .tl-beat .tl-icon {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        flex-shrink: 0;
        margin-top: 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        color: #fff;
      }
      .tl-beat.action .tl-icon {
        background: #5b9bd5;
      }
      .tl-beat.dialogue .tl-icon {
        background: #e8a838;
      }
      .tl-beat.transition .tl-icon {
        background: #999;
      }
      .tl-beat .tl-body {
        flex: 1;
        min-width: 0;
      }
      .tl-beat .tl-body .tl-char {
        font-size: 10px;
        font-weight: 600;
        color: #e8a838;
      }
      .tl-beat .tl-body .tl-text {
        font-size: 11px;
        color: #555;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .tl-beat .tl-body .tl-desc {
        font-size: 11px;
        color: #555;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .tl-beat .tl-edit {
        display: none;
        flex-shrink: 0;
        font-size: 10px;
        color: #999;
        cursor: pointer;
        padding: 1px 4px;
      }
      .tl-beat:hover .tl-edit {
        display: block;
      }
      .tl-beat .tl-edit:hover {
        color: #111;
      }
      .tl-tooltip {
        display: none;
        position: absolute;
        background: #fff;
        border: 1px solid #ddd;
        padding: 8px 10px;
        font-size: 11px;
        max-width: 260px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        z-index: 20;
        color: #444;
        white-space: pre-wrap;
        line-height: 1.5;
      }
      .tl-edit-inline {
        display: none;
        padding: 4px 8px 4px 32px;
      }
      .tl-edit-inline textarea {
        width: 100%;
        padding: 6px;
        font:
          11px "SF Mono",
          "Consolas",
          monospace;
        border: 1px solid #dcdee2;
        resize: vertical;
        min-height: 36px;
        outline: none;
      }
      .tl-edit-inline textarea:focus {
        border-color: #444;
      }
      .tl-edit-inline .tl-edit-btns {
        display: flex;
        gap: 4px;
        margin-top: 4px;
        justify-content: flex-end;
      }
      .tl-edit-inline .tl-edit-btns button {
        font-size: 10px;
        padding: 2px 8px;
        border: 1px solid #dcdee2;
        cursor: pointer;
        background: #fff;
      }
      .tl-edit-inline .tl-edit-btns button:hover {
        background: #f5f5f5;
      }
      .tl-empty {
        color: #ccc;
        font-size: 12px;
        padding: 20px;
        text-align: center;
      }

      /* misc */
      .spinner {
        display: none;
        width: 12px;
        height: 12px;
        border: 2px solid #e8e8ec;
        border-top-color: #888;
        border-radius: 50%;
        animation: s 0.6s linear infinite;
      }
      .spinner.show {
        display: inline-block;
      }
      @keyframes s {
        to {
          transform: rotate(360deg);
        }
      }

      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 10px 20px;
        font-size: 12px;
        z-index: 9999;
        display: none;
        background: #111;
        color: #fff;
      }
      .toast.show {
        display: block;
      }
      .toast-error {
        background: #c62828;
      }

      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-thumb {
        background: #ddd;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Novel2Script</h1>
      <p>将 3 章以上的小说文本自动转换为结构化 YAML 剧本</p>
    </div>

    <div class="wrapper">
      <!-- ====== 上半部分 ====== -->
      <div class="row">
        <!-- 1. 输入 -->
        <div class="panel">
          <div class="phead">输入</div>
          <div class="pbody">
            <div class="fg">
              <label>上传小说文件 (.txt / .md / .epub)</label>
              <input type="file" id="file-input" accept=".txt,.md,.epub" />
            </div>
            <div class="fg">
              <label>LLM 服务商</label>
              <select id="model-select">
                <option value="deepseek">DeepSeek</option>
                <option value="openai">OpenAI</option>
                <option value="claude">Claude</option>
                <option value="ollama">Ollama</option>
              </select>
            </div>
            <div class="fg">
              <label>剧本标题</label>
              <input
                type="text"
                id="title-input"
                placeholder="默认取自文件名"
              />
            </div>
            <div class="fg">
              <label>原作者</label>
              <input type="text" id="author-input" placeholder="选填" />
            </div>
            <button
              class="btn btn-primary"
              style="width: 100%; padding: 10px"
              onclick="doConvert()"
            >
              <span class="spinner" id="spinner-convert"></span>开始转换
            </button>
          </div>
        </div>

        <!-- 2. 输出信息（不含YAML） -->
        <div class="panel" id="output-info">
          <div class="phead">输出信息</div>
          <div class="pbody">
            <div class="progress-wrap" id="progress-wrap">
              <div class="progress-bar"><div class="fill"></div></div>
              <div class="progress-text" id="progress-text">准备中...</div>
            </div>
            <div
              class="status status-ok"
              id="status-box"
              style="display: none"
            ></div>
            <div class="stats" id="stats-box" style="display: none"></div>
            <div class="error-view" id="error-view">
              <div class="error-header" id="error-header"></div>
              <div class="error-body" id="error-body"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ====== 下半部分 ====== -->
      <div class="row">
        <!-- 3. 时间线 / 错误提示栏 -->
        <div class="panel">
          <div class="phead">时间线</div>
          <div class="pbody" id="timeline">
            <div class="tl-empty">转换后将显示时间线</div>
          </div>
        </div>

        <!-- 4. YAML 预览 + 按钮 -->
        <div class="panel">
          <div class="phead">YAML 剧本预览</div>
          <div class="pbody yaml-area">
            <!-- 浮动按钮 -->
            <div class="yaml-nav">
              <button class="btn btn-secondary btn-sm" onclick="doValidate()">
                <span class="spinner" id="spinner-validate"></span>校验
              </button>
              <button class="btn btn-secondary btn-sm" onclick="doSave()">
                <span class="spinner" id="spinner-save"></span>保存并导出
              </button>
              <button
                class="btn btn-secondary btn-sm"
                id="btn-download"
                style="display: none"
                onclick="doDownload()"
              >
                下载
              </button>
            </div>
            <textarea
              id="yaml-editor"
              placeholder="转换结果将显示在此..."
              spellcheck="false"
            ></textarea>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      let savedPath = "";

      function showToast(msg, type) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className =
          "toast show " + (type === "error" ? "toast-error" : "toast-info");
        setTimeout(() => t.classList.remove("show"), 4000);
      }
      function sp(id, v) {
        document.getElementById(id).classList[v ? "add" : "remove"]("show");
      }

      async function doConvert() {
        const fi = document.getElementById("file-input");
        if (!fi.files.length) {
          showToast("请先选择文件", "error");
          return;
        }
        sp("spinner-convert", true);

        // show progress
        const pw = document.getElementById("progress-wrap");
        const pt = document.getElementById("progress-text");
        pw.classList.add("show");
        pt.textContent = "正在上传文件...";

        const fd = new FormData();
        fd.append("file", fi.files[0]);
        fd.append("model", document.getElementById("model-select").value);
        fd.append("title", document.getElementById("title-input").value);
        fd.append("author", document.getElementById("author-input").value);
        try {
          pt.textContent = "正在处理中...";
          const r = await fetch("/api/convert", { method: "POST", body: fd });
          pt.textContent = "正在生成结果...";
          const d = await r.json();
          if (!d.ok) {
            pw.classList.remove("show");
            showToast(d.error || "转换失败", "error");
            return;
          }
          pt.textContent = "转换完成！";
          setTimeout(function () {
            pw.classList.remove("show");
          }, 800);
          document.getElementById("yaml-editor").value = d.yaml;
          document.getElementById("stats-box").style.display = "block";
          document.getElementById("stats-box").innerHTML =
            "角色:<span>" +
            d.stats.characters +
            "</span> | 幕:<span>" +
            d.stats.acts +
            "</span> | 场:<span>" +
            d.stats.scenes +
            "</span> | 节拍:<span>" +
            d.stats.beats +
            "</span> | 对白:<span>" +
            d.stats.dialogues +
            "</span>";
          document.getElementById("status-box").style.display = "block";
          document.getElementById("status-box").className = "status status-ok";
          document.getElementById("status-box").textContent = "转换完成";
          document.getElementById("btn-download").style.display =
            "inline-block";
          savedPath = d.output_path;
          document.getElementById("error-view").classList.remove("show");
          renderTimeline();
          showToast("转换完成", "info");
        } catch (e) {
          pw.classList.remove("show");
          showToast("请求失败: " + e.message, "error");
        } finally {
          sp("spinner-convert", false);
        }
      }

      // ── 时间线 ──
      function renderTimeline() {
        const y = document.getElementById("yaml-editor").value;
        const data = parseTimelineData(y);
        _tlData = data;
        const tl = document.getElementById("timeline");
        if (!data.meta.length && !data.characters.length && !data.beats.length) {
          tl.innerHTML = '<div class="tl-empty">转换后将显示时间线</div>'; return;
        }

        let html = "";

        // meta
        if (data.meta.length) {
          html += '<div class="tl-section"><h4>剧本信息</h4>';
          for (const f of data.meta) {
            html += '<div class="tl-meta-row" onclick="editMeta(' + f.yamlLine + ',\'' + escapeHtml(f.key) + '\',\'' + escapeHtml(f.value) + '\')"><span class="tl-key">' + escapeHtml(f.key) + '</span><span class="tl-val">' + escapeHtml(f.value) + '</span><span class="tl-edit">edit</span></div>';
          }
          html += '</div>';
        }

        // characters
        if (data.characters.length) {
          html += '<div class="tl-section"><h4>角色</h4><div class="tl-chars-list">';
          for (const c of data.characters) {
            html += '<div class="tl-char-card" onclick="editChar(\'' + c.id + '\',' + c.yamlLine + ')">';
            html += '<span class="tl-icon">' + escapeHtml(c.id[0] || '?') + '</span>';
            html += '<div class="tl-body">';
            html += '<span class="tl-char-id">' + escapeHtml(c.id) + '</span> ';
            html += '<span class="tl-char-name">' + escapeHtml(c.name) + '</span>';
            html += '<span class="tl-char-role">' + escapeHtml(c.role || '') + '</span>';
            html += '<br><span class="tl-char-detail">';
            var parts = [];
            if (c.gender) parts.push(c.gender);
            if (c.age) parts.push(c.age);
            if (c.archetype) parts.push(c.archetype);
            if (c.traits) parts.push(c.traits);
            if (c.relationships) parts.push(c.relationships);
            if (c.aliases) parts.push('别:' + c.aliases);
            html += escapeHtml(parts.join(' · '));
            html += '</span>';
            html += '</div>';
            html += '<span class="tl-edit">edit</span>';
            html += '</div>';
          }
          html += '</div></div>';
        }

        // beats (scenes)
        let sceneIdx = -1;
        for (const b of data.beats) {
          if (b.sceneIdx !== sceneIdx) {
            sceneIdx = b.sceneIdx;
            if (sceneIdx > 0) html += '</div>';
            html += '<div class="tl-scene"><h4>' + escapeHtml(b.sceneTitle || '场景 ' + (sceneIdx + 1)) + '</h4>';
          }
          const icon = {action:"A",dialogue:"D",transition:"T"}[b.type] || "?";
          const body = b.type === "dialogue"
            ? '<span class="tl-char">' + escapeHtml(b.character||"?") + '</span><br><span class="tl-text">' + escapeHtml(b.line||"") + '</span>'
            : b.type === "transition"
            ? '<span class="tl-text">' + escapeHtml(b.transition||"") + '</span>'
            : '<span class="tl-desc">' + escapeHtml(b.description||"") + '</span>';
          html += '<div class="tl-beat ' + b.type + '" data-idx="' + b.idx + '" onclick="editBeatInline(' + b.idx + ')" onmouseenter="showBeatTip(event,' + b.idx + ')" onmouseleave="hideBeatTip()">';
          html += '<span class="tl-icon">' + icon + '</span><div class="tl-body">' + body + '</div><span class="tl-edit">edit</span></div>';
        }
        html += '</div>';
        tl.innerHTML = html;

        const ed = document.getElementById("yaml-editor");
        tl.scrollTop = Math.floor(ed.scrollTop * (tl.scrollHeight / ed.scrollHeight));
      }

      let _tlData = null;
      let _editIdx = -1;

      function parseTimelineData(yaml) {
        const lines = yaml.split("\n");
        const metaFields = [];
        const characters = [];
        const beats = [];
        let inMeta = false, inChars = false, inStruct = false;
        let sceneIdx = -1, sceneTitle = "", beat = null;

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];

          // section boundaries
          const trimmed = line.trim();
          if (trimmed === "meta:") { inMeta = true; inChars = false; continue; }
          if (trimmed === "characters:") { inMeta = false; inChars = true; continue; }
          if (trimmed === "structure:") { inMeta = false; inChars = false; inStruct = true; continue; }

          // meta fields
          if (inMeta) {
            const m = line.match(/^\s+(\w+):\s*(.*)/);
            if (m) metaFields.push({key:m[1], value:(m[2]||"").replace(/^["']|["']$/g,""), yamlLine:i+1});
            continue;
          }

          // character entries
          if (inChars) {
            const idm = line.match(/^\s*- id:\s*(.+)/);
            if (idm) {
              let c = {id:idm[1].trim(), name:"", role:"", desc:"", gender:"", age:"", archetype:"", aliases:"", traits:"", relationships:"", notes:"", yamlLine:i+1};
              for (let j = i+1; j < lines.length; j++) {
                const nl = lines[j];
                if (nl.trim().startsWith("- id:") || nl.trim() === "structure:") break;
                const fm = nl.match(/^\s+(\w+):\s*(.*)/);
                if (!fm) continue;
                const key = fm[1], val = fm[2].trim().replace(/^['"]|['"]$/g, "");
                if (key === "name") c.name = val;
                else if (key === "role") c.role = val;
                else if (key === "description") c.desc = val;
                else if (key === "gender") c.gender = val;
                else if (key === "age") c.age = val;
                else if (key === "archetype") c.archetype = val;
                else if (key === "notes" && val) c.notes = val;
                else if (key === "aliases" && val === "") {
                  let ali = [];
                  for (let k = j+1; k < lines.length; k++) {
                    const am = lines[k].match(/^\s+- (.+)/);
                    if (am) ali.push(am[1].trim()); else break;
                  }
                  c.aliases = ali.join(", ");
                }
                else if (key === "traits" && val === "") {
                  let tr = [];
                  for (let k = j+1; k < lines.length; k++) {
                    const tm = lines[k].match(/^\s+- (.+)/);
                    if (tm) tr.push(tm[1].trim()); else break;
                  }
                  c.traits = tr.join(", ");
                }
                else if (key === "relationships" && val === "") {
                  let rel = 0;
                  for (let k = j+1; k < lines.length; k++) {
                    if (lines[k].match(/^\s+- character:/)) rel++;
                    if (!lines[k].match(/^\s{6,}/)) break;
                  }
                  c.relationships = rel + "条";
                }
              }
              characters.push(c);
            }
            continue;
          }

          // scene detection
          const sm = line.match(/^(?:\s*-)?\s*scene_number:\s*(\d+)/);
          if (sm) { sceneIdx = parseInt(sm[1]) - 1; sceneTitle = "Scene " + sm[1]; }
          const ssm = line.match(/^\s+summary:\s*(.+)/);
          if (ssm && sceneIdx >= 0) sceneTitle = ssm[1].trim();
          const hlm = line.match(/^\s+location:\s*(.+)/);
          if (hlm && sceneIdx >= 0) sceneTitle = hlm[1].trim() + " - Scene " + (sceneIdx + 1);

          // beat detection
          if (line.match(/^\s+- type:\s*(action|dialogue|transition)/)) {
            if (beat) beats.push(beat);
            beat = {type:line.match(/type:\s*(action|dialogue|transition)/)[1], idx:beats.length, sceneIdx, sceneTitle, yamlLine:i+1, description:"", character:"", line:"", transition:"", parenthetical:""};
            continue;
          }
          if (beat && line.match(/^\s+description:\s*(.+)/)) { beat.description = line.match(/description:\s*(.+)/)[1].trim().replace(/^["']|["']$/g,""); }
          if (beat && line.match(/^\s+character:\s*(.+)/)) { beat.character = line.match(/character:\s*(.+)/)[1].trim(); }
          if (beat && line.match(/^\s+line:\s*(.+)/)) {
            let l = line.match(/line:\s*(.+)/)[1].trim().replace(/^["']|["']$/g,"");
            if (l.endsWith("|-") || l.endsWith(">")) {
              let ml = "";
              for (let j = i+1; j < lines.length; j++) {
                const nl = lines[j];
                if (!nl.match(/^\s{10,}/)) break;
                ml += (ml?" ":"") + nl.trim();
                i = j;
              }
              l = l.slice(0,-1) + ml;
            }
            beat.line = l;
          }
          if (beat && line.match(/^\s+transition:\s*(.+)/)) { beat.transition = line.match(/transition:\s*(.+)/)[1].trim().replace(/^["']|["']$/g,""); }
          if (beat && line.match(/^\s+parenthetical:\s*(.+)/)) { beat.parenthetical = line.match(/parenthetical:\s*(.+)/)[1].trim().replace(/^["']|["']$/g,""); }
        }
        if (beat) beats.push(beat);
        return {meta:metaFields, characters, beats};
      }

      function editMeta(lineNum, key, curVal) {
        cancelEdit();
        _editIdx = -2; // meta mode
        _editInfo = {lineNum,key};
        const tl = document.getElementById("timeline");
        const row = tl.querySelector('.tl-meta-row[onclick*="' + lineNum + '"]');
        if (!row) return;
        const div = document.createElement("div");
        div.className = "tl-edit-inline";
        div.style.display = "block";
        div.innerHTML = '<textarea>' + escapeHtml(curVal) + '</textarea><div class="tl-edit-btns"><button onclick="saveMetaEdit()">保存</button><button onclick="cancelEdit()">取消</button></div>';
        row.parentNode.insertBefore(div, row.nextSibling);
      }

      function saveMetaEdit() {
        if (_editIdx !== -2) return;
        const div = document.querySelector(".tl-edit-inline");
        if (!div) return;
        const ta = div.querySelector("textarea");
        if (!ta) return;
        const newVal = ta.value.trim();
        if (!newVal) { cancelEdit(); return; }
        const editor = document.getElementById("yaml-editor");
        const lines = editor.value.split("\n");
        updateYamlLine(lines, _editInfo.lineNum, _editInfo.key, '"' + newVal + '"');
        editor.value = lines.join("\n");
        cancelEdit();
        renderTimeline();
      }

      function editChar(cid, lineNum) {
        cancelEdit();
        _editIdx = -3;
        _editInfo = {lineNum};
        const editor = document.getElementById("yaml-editor");
        const lines = editor.value.split("\n");
        let vals = {};
        for (let i = lineNum-1; i < Math.min(lineNum+30, lines.length); i++) {
          const nl = lines[i];
          if (nl.trim().startsWith("- id:") && i > lineNum-1) break;
          const fm = nl.match(/^\s+(\w+):\s*(.*)/);
          if (!fm) continue;
          const key = fm[1], val = fm[2].trim().replace(/^['"]|['"]$/g, "");
          if (["name","role","description","gender","age","archetype","notes"].includes(key) && val) vals[key] = val;
          if (key === "aliases" && !vals.aliases) {
            let a = []; for (let k = i+1; k < lines.length; k++) { const am = lines[k].match(/^\s+- (.+)/); if (am) a.push(am[1].trim()); else break; }
            if (a.length) vals.aliases = a.join(", ");
          }
          if (key === "traits" && !vals.traits) {
            let t = []; for (let k = i+1; k < lines.length; k++) { const tm = lines[k].match(/^\s+- (.+)/); if (tm) t.push(tm[1].trim()); else break; }
            if (t.length) vals.traits = t.join(", ");
          }
        }
        const tl = document.getElementById("timeline");
        const tag = tl.querySelector('.tl-char-card[onclick*="' + cid + '"]');
        if (!tag) return;
        const div = document.createElement("div");
        div.className = "tl-edit-inline";
        div.style.display = "block";
        div.innerHTML = '<textarea rows="12">' + escapeHtml(
          "name: " + (vals.name||"") + "\n" +
          "role: " + (vals.role||"") + "\n" +
          "gender: " + (vals.gender||"") + "\n" +
          "age: " + (vals.age||"") + "\n" +
          "archetype: " + (vals.archetype||"") + "\n" +
          "traits: " + (vals.traits||"") + "\n" +
          "aliases: " + (vals.aliases||"") + "\n" +
          "description: " + (vals.description||"") + "\n" +
          "notes: " + (vals.notes||"")
        ) + '</textarea><div class="tl-edit-btns"><button onclick="saveCharEdit()">保存</button><button onclick="cancelEdit()">取消</button></div>';
        tag.parentNode.insertBefore(div, tag.nextSibling);
      }

      function saveCharEdit() {
        if (_editIdx !== -3) return;
        const div = document.querySelector(".tl-edit-inline");
        if (!div) return;
        const ta = div.querySelector("textarea");
        if (!ta) return;
        const edits = {};
        ta.value.split("\n").forEach(function(l) {
          const m = l.match(/^(\w+):\s*(.*)/);
          if (m) edits[m[1]] = m[2].trim();
        });
        const editor = document.getElementById("yaml-editor");
        const lines = editor.value.split("\n");
        const ln = _editInfo.lineNum - 1;

        // Process each field
        const fieldOrder = ["name","role","gender","age","archetype","traits","aliases","description","notes"];
        for (let i = ln; i < Math.min(ln+60, lines.length); i++) {
          if (lines[i].trim().startsWith("- id:") && i > ln) break;
          for (const key of fieldOrder) {
            if (!edits[key]) continue;
            const fm = lines[i].match(new RegExp("^(\\s+)" + key + ":\\s*(.*)"));
            if (fm) {
              if ((key === "traits" || key === "aliases")) {
                var indent = fm[1];
                // Delete old list items after this key
                var delCount = 0;
                for (var k = i+1; k < lines.length; k++) {
                  var kline = lines[k];
                  if (kline.match(new RegExp("^" + indent.replace(/([.*+?^=!:${}()|[\]\/\\])/g, "\\$1") + "\\s{2}- "))) {
                    delCount++;
                  } else {
                    break;
                  }
                }
                if (delCount > 0) lines.splice(i+1, delCount);
                // Insert new items
                var items = edits[key].split(",").map(function(s){return s.trim()}).filter(Boolean);
                if (items.length) {
                  var newLines = items.map(function(it){return indent + "  - " + it});
                  lines.splice(i+1, 0, ...newLines);
                }
                lines[i] = indent + key + ":";
                delete edits[key];
              } else {
                lines[i] = fm[1] + key + ": " + edits[key];
                delete edits[key];
              }
              break;
            }
          }
        }
        editor.value = lines.join("\n");
        cancelEdit();
        renderTimeline();
      }

      function cancelEdit() {
        const old = document.querySelector(".tl-edit-inline");
        if (old) old.remove();
        _editIdx = -1;
      }

      let _editInfo = null;

      function editBeatInline(idx) {
        const b = (_tlData && _tlData.beats) ? _tlData.beats[idx] : null;
        if (!b) return;
        _editIdx = idx;
        _editInfo = null;
        const tl = document.getElementById("timeline");
        const target = tl.querySelector('.tl-beat[data-idx="' + idx + '"]');
        if (!target) return;
        const old = tl.querySelector(".tl-edit-inline");
        if (old) old.remove();
        const div = document.createElement("div");
        div.className = "tl-edit-inline";
        div.style.display = "block";
        let val = "";
        if (b.type === "action") val = b.description;
        else if (b.type === "dialogue") val = b.character + ": " + b.line;
        else if (b.type === "transition") val = b.transition;
        div.innerHTML = '<textarea>' + escapeHtml(val) + '</textarea><div class="tl-edit-btns"><button onclick="saveBeatEdit()">保存</button><button onclick="cancelEdit()">取消</button></div>';
        target.parentNode.insertBefore(div, target.nextSibling);
      }

      function saveBeatEdit() {
        if (_editIdx < 0) return;
        const div = document.querySelector(".tl-edit-inline");
        if (!div) return;
        const ta = div.querySelector("textarea");
        if (!ta) return;
        const newVal = ta.value.trim();
        if (!newVal) { cancelEdit(); return; }
        const b = (_tlData && _tlData.beats) ? _tlData.beats[_editIdx] : null;
        if (!b) { cancelEdit(); return; }
        const editor = document.getElementById("yaml-editor");
        const lines = editor.value.split("\n");

        if (b.type === "action") {
          updateYamlLine(lines, b.yamlLine, "description", '"' + newVal + '"');
        } else if (b.type === "dialogue") {
          const colon = newVal.indexOf(":");
          if (colon > 0) {
            updateYamlLine(lines, b.yamlLine, "character", newVal.substring(0, colon).trim());
            updateYamlLine(lines, b.yamlLine + 1, "line", '"' + newVal.substring(colon + 1).trim() + '"');
          }
        } else if (b.type === "transition") {
          updateYamlLine(lines, b.yamlLine, "transition", '"' + newVal + '"');
        }
        editor.value = lines.join("\n");
        cancelEdit();
        renderTimeline();
      }

      function updateYamlLine(lines, baseLine, field, value) {
        for (let i = baseLine - 1; i < lines.length; i++) {
          const m = lines[i].match(new RegExp("^(\\s+)" + field + ":\\s*(.+)"));
          if (m) {
            lines[i] = m[1] + field + ": " + value;
            return;
          }
        }
      }

      function showBeatTip(e, idx) {
        const b = (_tlData && _tlData.beats) ? _tlData.beats[idx] : null;
        if (!b) return;
        let text = b.parenthetical || "";
        if (!text) return;
        let tip = document.getElementById("beat-tip");
        if (!tip) {
          tip = document.createElement("div");
          tip.id = "beat-tip";
          tip.className = "tl-tooltip";
          document.body.appendChild(tip);
        }
        tip.textContent = text;
        tip.style.display = "block";
        tip.style.left = Math.min(e.pageX + 12, window.innerWidth - 280) + "px";
        tip.style.top = e.pageY + "px";
      }

      function hideBeatTip() {
        const tip = document.getElementById("beat-tip");
        if (tip) tip.style.display = "none";
      }

      // YAML editor change → update timeline
      document.addEventListener("DOMContentLoaded", function () {
        const editor = document.getElementById("yaml-editor");
        let timer;
        editor.addEventListener("input", function () {
          clearTimeout(timer);
          timer = setTimeout(renderTimeline, 500);
        });
        // scroll sync: timeline ↔ YAML editor
        const tl = document.getElementById("timeline");
        let syncing = false;
        editor.addEventListener("scroll", function () {
          if (syncing) return;
          syncing = true;
          if (tl)
            tl.scrollTop = Math.floor(
              editor.scrollTop * (tl.scrollHeight / editor.scrollHeight),
            );
          setTimeout(function () {
            syncing = false;
          }, 50);
        });
        tl.addEventListener("scroll", function () {
          if (syncing || !editor) return;
          syncing = true;
          editor.scrollTop = Math.floor(
            tl.scrollTop * (editor.scrollHeight / tl.scrollHeight),
          );
          setTimeout(function () {
            syncing = false;
          }, 50);
        });
      });

      async function doValidate() {
        const y = document.getElementById("yaml-editor").value;
        if (!y.trim()) {
          showToast("YAML 为空", "error");
          return;
        }
        sp("spinner-validate", true);
        try {
          const r = await fetch("/api/validate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ yaml: y }),
          });
          const d = await r.json();
          if (d.valid) {
            document.getElementById("error-view").classList.remove("show");
            document.getElementById("status-box").style.display = "block";
            document.getElementById("status-box").className =
              "status status-ok";
            document.getElementById("status-box").textContent = "校验通过";
            renderTimeline();
            showToast("校验通过", "info");
          } else {
            renderErrors(y, d.errors);
            document.getElementById("status-box").style.display = "block";
            document.getElementById("status-box").className =
              "status status-err";
            document.getElementById("status-box").textContent =
              d.errors.length + " 处错误";
          }
        } catch (e) {
          showToast("校验失败: " + e.message, "error");
        } finally {
          sp("spinner-validate", false);
        }
      }

      function renderErrors(yaml, errors) {
        const lines = yaml.split("\n");
        const errMap = {};
        errors.forEach((e) => {
          const ln = findLine(lines, e);
          if (!errMap[ln]) errMap[ln] = [];
          errMap[ln].push(e);
        });
        document.getElementById("error-header").textContent =
          errors.length + " 处错误";
        const body = document.getElementById("error-body");
        let h = "";
        for (let i = 1; i <= lines.length; i++) {
          const es = errMap[i] || [];
          h +=
            '<div class="error-line' +
            (es.length ? " hl" : "") +
            '"><span class="ln">' +
            (es.length ? "\u25b6" + i : i) +
            "</span> " +
            escapeHtml(lines[i - 1]) +
            "</div>";
          for (const m of es)
            h += '<div class="error-msg">' + escapeHtml(m) + "</div>";
        }
        body.innerHTML = h;
        document.getElementById("error-view").classList.add("show");

        // update sidebar
        const items = [];
        for (const [ln, msgs] of Object.entries(errMap)) {
          for (const msg of msgs) items.push({ ln: parseInt(ln), msg: msg });
        }
        items.sort((a, b) => a.ln - b.ln);
      }

      function findLine(lines, err) {
        let m = err.match(
          /角色\s*\'(.+?)\'\s*的关系引用了不存在的角色\s*\'(.+?)\'/,
        );
        if (m) {
          const t = m[2];
          for (let i = 0; i < lines.length; i++)
            if (lines[i].includes(t)) return i + 1;
          return 1;
        }
        m = err.match(/第(\d+)幕第(\d+)场的对白引用了不存在的角色\s*\'(.+?)\'/);
        if (m) {
          const sn = parseInt(m[2]),
            tgt = m[3];
          return findInScene(lines, sn, tgt) || 1;
        }
        m = err.match(/第(\d+)幕第(\d+)场引用了不存在的角色\s*\'(.+?)\'/);
        if (m) {
          const sn = parseInt(m[2]),
            tgt = m[3];
          return findInScene(lines, sn, tgt) || 1;
        }
        if (err.includes("重复") || err.includes("递增")) {
          for (let i = 0; i < lines.length; i++)
            if (lines[i].includes("scene_number:")) return i + 1;
          return 1;
        }
        return 1;
      }

      function findInScene(lines, sn, tgt) {
        let inS = false;
        for (let i = 0; i < lines.length; i++) {
          if (lines[i].match(new RegExp("scene_number:\\s*" + sn + "\\b")))
            inS = true;
          else if (inS && lines[i].match(/scene_number:/)) return null;
          if (inS && lines[i].includes(tgt)) return i + 1;
        }
        return null;
      }

      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      async function doSave() {
        const y = document.getElementById("yaml-editor").value;
        if (!y.trim()) {
          showToast("YAML 为空", "error");
          return;
        }
        sp("spinner-save", true);
        try {
          const vr = await fetch("/api/validate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ yaml: y }),
          });
          const vd = await vr.json();
          if (!vd.valid) {
            renderErrors(y, vd.errors);
            document.getElementById("status-box").style.display = "block";
            document.getElementById("status-box").className =
              "status status-err";
            document.getElementById("status-box").textContent =
              "校验未通过，请修复后再保存";
            showToast("校验未通过", "error");
            return;
          }
          const fn = savedPath
            ? (
                savedPath.replace(/\\/g, "/").split("/").pop() || "screenplay"
              ).replace(/\.yaml$/, "_edited")
            : "screenplay_edited";
          const sr = await fetch("/api/save", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ yaml: y, filename: fn }),
          });
          const sd = await sr.json();
          if (!sd.ok) {
            showToast(sd.error || "保存失败", "error");
            return;
          }
          savedPath = sd.path;
          document.getElementById("btn-download").style.display =
            "inline-block";
          document.getElementById("status-box").style.display = "block";
          document.getElementById("status-box").className = "status status-ok";
          document.getElementById("status-box").textContent =
            "已保存: " + sd.filename;
          showToast("保存成功", "info");
        } catch (e) {
          showToast("保存失败: " + e.message, "error");
        } finally {
          sp("spinner-save", false);
        }
      }

      function doDownload() {
        if (!savedPath) return;
        const fn = savedPath.replace(/\\/g, "/").split("/").pop();
        window.open("/api/download/" + encodeURIComponent(fn), "_blank");
      }

      // YAML editor resize
      (function () {
        const editor = document.getElementById("yaml-editor");
        editor.addEventListener("input", function () {
          this.style.height = "auto";
          this.style.height = this.scrollHeight + "px";
        });
      })();
    </script>
  </body>
